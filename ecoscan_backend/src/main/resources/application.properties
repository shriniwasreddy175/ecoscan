spring.application.name=EcoScan_backend
# Use environment variables for sensitive values. Defaults are provided for
# local development but you should override them in production.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/EcoScan_DB1}
spring.datasource.username=${DB_USER:DSUser}
spring.datasource.password=${DB_PASSWORD:school123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Server port can be overridden via SERVER_PORT env var
server.port=${SERVER_PORT:8080}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect